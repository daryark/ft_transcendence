events {
}

http {
    log_format elk_logging escape=json '{'
    '"timestamp": "$time_iso8601",'
    '"remote_addr": "$http_x_forwarded_for",'
    '"proxy_addr": "$remote_addr",'
    '"request": "$request",'
    '"status": "$status",'
    '"body_bytes_sent": "$body_bytes_sent",'
    '"http_user_agent": "$http_user_agent"'
    '}';
    access_log /var/log/nginx/access.log elk_logging;
    server{
        listen      443 ssl;
        #server_name  ft-transcendence.42.fr www.ft-transcendence.42.fr;
        #root    /var/www/;
        #index  index.php;
        ssl_certificate     /etc/nginx/ssl/transendence.42.fr.crt;
        ssl_certificate_key /etc/nginx/ssl/transendence.42.fr.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        #listen 80;
        access_log /var/log/nginx/frontend_access.log elk_logging;
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/(.*) {
            proxy_pass http://backend:3000;
        }
    }
}
    